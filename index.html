<!DOCTYPE html>
<html>
<head>
  <title>GameNova</title>
</head>
<body style="text-align:center;">
  <h1>Tap Fast Game 🎮</h1>
  <h2 id="score">0</h2>
  <button onclick="tap()">TAP</button>

  <script>
    let score = 0;
    function tap() {
      score++;
      document.getElementById("score").innerText = score;
    }
  </script>
</body>
</html>
